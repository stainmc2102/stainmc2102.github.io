<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>StainMC — Intro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="assets/style.css" />

    <style>
        .intro {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            z-index: 9999;
            pointer-events: none;
            background: transparent;
        }
        
        .intro .logo {
            width: 110px;
            height: 110px;
            border-radius: 20px;
            object-fit: cover;
            border: 2px solid rgba(0, 255, 168, 0.12);
            box-shadow: 0 10px 40px rgba(0, 255, 168, 0.04);
        }
        
        .intro h1 {
            margin: 6px 0 0;
            font-family: "JetBrains Mono", monospace;
            font-weight: 800;
            color: #00ffa8;
            font-size: 1.6rem;
            letter-spacing: .06em;
            text-shadow: 0 0 18px rgba(0, 255, 168, .12);
        }
        
        .intro .type {
            margin-top: 6px;
            font-family: "JetBrains Mono", monospace;
            font-weight: 600;
            color: #9fb3c8;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid #00ffa8;
            padding-right: 6px;
        }
        
        .skip {
            position: fixed;
            bottom: 22px;
            right: 22px;
            z-index: 9999;
            pointer-events: auto;
            background: #00ffa8;
            color: #001212;
            font-weight: 800;
            border: none;
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0, 255, 168, .08);
        }
    </style>



</head>

<body>
    <div id="matrix-wrap"><canvas id="matrix"></canvas></div>
    <div class="bg-overlay" aria-hidden="true"></div>

    <div class="intro" id="intro">
        <img src="assets/avatar.png" alt="avatar" class="logo" />
        <h1>Welcome to StainMC - Portfolio</h1>
        <div class="type" id="intro-type" aria-live="polite"></div>
    </div>

    <button class="skip" id="skipBtn" aria-label="Skip intro">Enter</button>

    <script src="assets/script.js"></script>
    <script>
        const lines = ["Hello, world.", "I'm Stain.", "Developer.", "I build bots & tools."];
        const el = document.getElementById('intro-type');
        let w = 0,
            i = 0,
            del = false;

        function tick() {
            const current = lines[w];
            if (!del) {
                i++;
                el.textContent = current.slice(0, i);
                if (i === current.length) {
                    del = true;
                    setTimeout(tick, 900);
                    return;
                }
            } else {
                i--;
                el.textContent = current.slice(0, i);
                if (i === 0) {
                    del = false;
                    w = (w + 1) % lines.length;
                }
            }
            setTimeout(tick, del ? 50 : 120);
        }
        tick();

        function go() {
    const path = location.pathname.split("/").pop();
    const target = path && path !== "index.html" ? path : "home.html";
    location.href = target;
}


        document.getElementById('skipBtn').addEventListener('click', go);
        setTimeout(go, 4800);
    </script>
</body>

</html>
